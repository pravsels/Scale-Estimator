<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Scale Estimator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="top">
    <div>
      <h1>How scaled are robot models&nbsp;?</h1>
      <div style="color:var(--dim);font-size:13px">Parameters vs. training tokens, next to some seminal LLMs. Click a model to open it.</div>
    </div>
  </div>

  <div class="hero">
    <div class="axiswrap">
      <svg id="scatter" viewBox="0 0 900 460" style="width:100%;height:auto"></svg>
      <div class="tip" id="tip"></div>
    </div>
    <div class="models" id="models"></div>
  </div>
</div>

<script src="data.js"></script>
<script src="scale.js"></script>
<script>
const $=id=>document.getElementById(id);

function draw(){
  let robot="";
  const cards=[];
  Object.keys(MODELS).forEach(name=>{
    const t=tokensFrom(getModelVals(name));
    const x=xm(t.N), y=ym(t.eff), href="model.html?m="+encodeURIComponent(name);
    robot+=`<a href="${href}">`
      +`<circle cx=${x} cy=${y} r="7" fill="#0d9488" stroke="#fff" stroke-width="2" style="cursor:pointer"/>`
      +`<text x=${x} y=${y-13} fill="#0d9488" font-size="12" font-weight="600" text-anchor="middle" style="cursor:pointer">${name}</text>`
      +`</a>`;
    cards.push(`<a class="modelcard" href="${href}"><div class="mname">${name}</div>`
      +`<div class="mmeta">${fmt(t.N)} params · ${fmt(t.eff)} tokens</div></a>`);
  });
  $("scatter").innerHTML=plotScaffold()+robot+plotBorder()+hoverLines();
  $("models").innerHTML=cards.join("");
}

if(typeof MODELS!=="undefined"){ draw(); attachCrosshair($("scatter"),$("tip")); }
</script>
</body>
</html>
